name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Ruff + Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite:///./test.db"
      JWT_SECRET: "ci-test-secret-key-for-testing-only"
      ENVIRONMENT: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint with Ruff
        run: ruff check app tests

      - name: Run pytest smoke test
        working-directory: .
        run: pytest backend/tests/test_api.py -q --maxfail=1 --tb=short
